# Dependabot config for golib.
#
# Go modules treat `require` as the minimum acceptable version, so a library's
# declared floor doubles as its compatibility promise. When you add
# dependencies, consider an `ignore` rule for minor/patch bumps on the ones you
# want pinned at a relaxed floor (so the minimum doesn't drift up automatically
# while majors are still PR'd for review). Example:
#
#   ignore:
#     - dependency-name: example.com/some/dep
#       update-types: [version-update:semver-minor, version-update:semver-patch]
version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    # Only bump direct dependencies. The indirect graph floats with the direct
    # dep that requires it, so bumping indirect modules on their own is churn
    # that drifts them out of step with their requirer. Security updates still
    # fire for indirect deps — `allow` does not gate them — so vuln coverage is
    # unaffected.
    allow:
      - dependency-type: direct
    # Batch routine bumps into one PR; majors stay individual so each
    # compatibility-affecting change (and the module floor it implies) is
    # reviewed on its own. Go has no dev/prod dependency split, so the only
    # meaningful grouping axis is update-type.
    groups:
      go-deps:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    # Action pins are low-risk to batch; group everything into one PR.
    groups:
      github-actions:
        patterns: ["*"]
